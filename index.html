<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farruxbek | Pro Gamer</title>
    <style>
        /* 1. ASOSIY FON */
        body {
            margin: 0;
            padding: 0;
            background-image: url('image_3.png'); /* GitHub'dagi rasm nomi bilan bir xil bo'lsin */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* Ustki qavat (hamma narsa ko'rinishi uchun) */
        .main-overlay {
            background: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .section-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 500px;
            margin-bottom: 30px;
        }

        /* CLICKER TUGMASI */
        .click-button {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: #00d2ff;
            border: 5px solid #fff;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px #00d2ff;
            transition: 0.3s;
            margin-top: 15px;
        }
        .click-button:hover { transform: scale(1.1); box-shadow: 0 0 40px #00d2ff; }

        /* IJTIMOIY TUGMALAR */
        .btn-link {
            display: inline-block;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .discord-btn { background: #5865F2; box-shadow: 0 4px 15px #5865F2; }
        .tg-btn { background: #24A1DE; box-shadow: 0 4px 15px #24A1DE; }

        /* REKLAMA */
        .ad-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .ad-card {
            background: rgba(0, 0, 0, 0.8);
            width: 280px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #00d2ff;
        }
    </style>
</head>
<body>

<div class="main-overlay">
    
    <div class="section-box">
        <h1 style="color: #00d2ff;">Farrux-Edits ⚡</h1>
        <p>Gamer va Video Editor portfoliosi</p>
        <div style="display: flex; justify-content: center;">
            <a href="https://www.twitch.tv/fr_edits32" target="_blank" style="color: #9146FF; margin: 0 10px;">Twitch</a>
            <a href="https://boosty.to/fr_edits" target="_blank" style="color: #ff4612; margin: 0 10px;">Boosty</a>
        </div>
    </div>

    <div class="section-box">
        <h3>Farrux-Clicker 🚀</h3>
        <div id="score" style="font-size: 50px; font-weight: bold; color: #fff;">0</div>
        <button class="click-button" onclick="addClick()">BOS! 🔥</button>
        <div id="win-text" style="display:none; color: gold; margin-top: 10px;">🏆 AFSONAVIY GAMER!</div>
    </div>

    <div class="section-box">
        <h3>BIZGA QO'SHILING</h3>
        <a href="https://discord.gg/mtruzrFZ" target="_blank" class="btn-link discord-btn">Discord Server</a>
        <a href="https://t.me/+ua9nAGiKN3FjM2My" target="_blank" class="btn-link tg-btn">Telegram Guruh</a>
    </div>

    <h2 style="margin-bottom: 20px;">REKLAMALAR 📢</h2>
    <div class="ad-grid">
        <div class="ad-card">
            <h4>Telegram Kanal</h4>
            <p>@FARRUX_PRO_PROGRAMMER</p>
            <a href="https://t.me/FARRUX_PRO_PROGRAMMER" target="_blank" style="color: #00d2ff;">Obuna bo'lish</a>
        </div>
        <div class="ad-card">
            <h4>Hamkorlik</h4>
            <p>Reklama berish uchun guruhga yozing.</p>
        </div>
    </div>

</div>

<script>
    let clicks = 0;
    function addClick() {
        clicks++;
        document.getElementById('score').innerText = clicks;
        if(clicks >= 500) {
            document.getElementById('win-text').style.display = 'block';
            document.getElementById('score').style.color = 'gold';
        }
    }
</script>

</body>
</html>
