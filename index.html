<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farrux-Edits | Gaming & Video Production</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            margin: 50px auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 200px;
            margin-bottom: 10px;
        }
        button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background-color: #4ecca3;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #45b393;
            transform: scale(1.05);
        }
        #greeting {
            font-size: 24px;
            margin-top: 20px;
            color: #4ecca3;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Farruxbekning Dunyosiga Xush Kelibsiz! 🚀</h1>
        <p>Ismingizni yozing va men siz bilan salomlashaman:</p>
        
        <input type="text" id="userName" placeholder="Ismingiz nima?">
        <button onclick="sayHello()">Salomlashish</button>
        
        <div id="greeting"></div>
        
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <p>Meni kuzatib boring:</p>
        <a href="https://www.twitch.tv/farrux_del" target="_blank" style="color: #9146FF; text-decoration: none; margin: 10px; font-weight: bold;">🎮 Twitch</a>
        <a href="https://boosty.to/fr_edits" target="_blank" style="color: #ff4612; text-decoration: none; margin: 10px; font-weight: bold;">🚀 Boosty</a>
    </div>

    <script>
        function sayHello() {
            let name = document.getElementById('userName').value;
            let greetingDiv = document.getElementById('greeting');
            
            if (name.length > 0) {
                greetingDiv.innerHTML = "Assalomu alaykum, " + name + "! Mening saytimga xush kelibsiz! 😊";
            } else {
                greetingDiv.innerHTML = "Iltimos, ismingizni yozing! 👇";
            }
        }
    </script>

</body>
</html>
